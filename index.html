<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEFRAM LIST</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --bg-black: #000000;
            --text-main: #ffffff;
            --text-dim: #666666;
            --border-color: rgba(255, 255, 255, 0.15);
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-main);
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- ヘッダー --- */
        .header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            flex-shrink: 0;
        }
        .back-btn { position: absolute; left: 16px; color: var(--neon-blue); font-size: 14px; font-weight: bold; }
        .nav-title { font-size: 14px; font-weight: 800; letter-spacing: 2px; }

        /* --- アクション --- */
        .action-area { padding: 12px; border-bottom: 1px solid var(--border-color); }
        .import-trigger {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 4px;
            border-radius: 4px;
        }

        /* --- リスト --- */
        .list-container { flex-grow: 1; overflow-y: auto; }
        .list-item {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .list-item:active { background: rgba(0, 242, 255, 0.1); }
        .song-title { font-size: 15px; flex-grow: 1; }
        .playing-now { color: var(--neon-blue); font-weight: bold; }
        .folder-tag { font-size: 10px; color: var(--neon-blue); opacity: 0.6; margin-top: 4px; }

        /* --- タブ --- */
        .tab-bar {
            height: 60px;
            display: flex;
            border-top: 1px solid var(--border-color);
            background: #000;
        }
        .tab-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 900;
            color: var(--text-dim);
        }
        .tab-item.active { color: var(--neon-blue); border-top: 2px solid var(--neon-blue); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header class="header">
        <div id="lib-back" class="back-btn hidden" onclick="backToPlaylists()">BACK</div>
        <div id="lib-title" class="nav-title">PLAYLISTS</div>
    </header>

    <div class="action-area">
        <button class="import-trigger" onclick="document.getElementById('file-input').click()">選 曲</button>
        <input type="file" id="file-input" class="hidden" accept="audio/*" multiple onchange="handleFiles(this.files)">
    </div>

    <div id="list-container" class="list-container"></div>

    <nav class="tab-bar">
        <div id="tab-playlists" class="tab-item active" onclick="switchTab('playlists')">PLAYLISTS</div>
        <div id="tab-mymusic" class="tab-item" onclick="switchTab('mymusic')">MY MUSIC</div>
    </nav>

    <audio id="audio-player"></audio>

    <script>
        let allSongs = [];
        let playlistData = {};
        let currentTab = 'playlists';
        let currentFolder = null;
        let currentPlayingUrl = null;

        const listContainer = document.getElementById('list-container');
        const audio = document.getElementById('audio-player');

        async function handleFiles(files) {
            if (files.length === 0) return;
            allSongs = [];
            playlistData = {};

            for (const file of files) {
                const fileURL = URL.createObjectURL(file);
                const folderName = file.webkitRelativePath ? file.webkitRelativePath.split('/')[0] : "Numbers";
                const song = { title: file.name.replace(/\.[^/.]+$/, ""), file: fileURL, folder: folderName };
                
                allSongs.push(song);
                if (!playlistData[folderName]) playlistData[folderName] = [];
                playlistData[folderName].push(song);
            }
            allSongs.sort((a, b) => a.title.localeCompare(b.title, 'ja'));
            render();
        }

        function switchTab(tab) {
            currentTab = tab;
            currentFolder = null;
            document.getElementById('tab-playlists').classList.toggle('active', tab === 'playlists');
            document.getElementById('tab-mymusic').classList.toggle('active', tab === 'mymusic');
            render();
        }

        function render() {
            listContainer.innerHTML = '';
            document.getElementById('lib-back').classList.add('hidden');

            if (currentTab === 'playlists') {
                document.getElementById('lib-title').textContent = "PLAYLISTS";
                if (currentFolder) {
                    document.getElementById('lib-back').classList.remove('hidden');
                    document.getElementById('lib-title').textContent = currentFolder.toUpperCase();
                    renderSongs(playlistData[currentFolder]);
                } else {
                    Object.keys(playlistData).forEach(folder => {
                        const item = document.createElement('div');
                        item.className = 'list-item';
                        item.innerHTML = `<span>${folder}</span><span style="color:var(--text-dim)">FOLDER</span>`;
                        item.onclick = () => { currentFolder = folder; render(); };
                        listContainer.appendChild(item);
                    });
                }
            } else {
                document.getElementById('lib-title').textContent = "MY MUSIC";
                renderSongs(allSongs, true);
            }
        }

        function renderSongs(songs, showFolder = false) {
            songs.forEach(song => {
                const item = document.createElement('div');
                item.className = 'list-item';
                const isPlaying = currentPlayingUrl === song.file && !audio.paused;
                item.innerHTML = `
                    <div>
                        <div class="song-title ${isPlaying ? 'playing-now' : ''}">${song.title}</div>
                        ${showFolder ? `<div class="folder-tag">${song.folder}</div>` : ''}
                    </div>
                    <div class="playing-now">${isPlaying ? '||' : '▶'}</div>
                `;
                item.onclick = () => playSong(song);
                listContainer.appendChild(item);
            });
        }

        function playSong(song) {
            if (audio.src === song.file) {
                if (audio.paused) audio.play();
                else audio.pause();
            } else {
                audio.src = song.file;
                currentPlayingUrl = song.file;
                audio.play();
            }
            render();
        }

        function backToPlaylists() { currentFolder = null; render(); }
        audio.onplay = render;
        audio.onpause = render;
        audio.onended = () => { currentPlayingUrl = null; render(); };
    </script>
</body>
</html>
