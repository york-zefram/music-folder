<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ZEFRAM">

    <title>ZEFRAM LIST</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --bg-black: #000000;
            --text-main: #ffffff;
            --text-dim: #666666;
            --border-color: rgba(0, 242, 255, 0.2);
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-main);
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding-top: env(safe-area-inset-top);
        }

        .header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            flex-shrink: 0;
        }
        .back-btn { position: absolute; left: 16px; color: var(--neon-blue); font-size: 14px; font-weight: bold; }
        .nav-title { font-size: 14px; font-weight: 800; letter-spacing: 2px; }

        .action-area { padding: 12px; border-bottom: 1px solid var(--border-color); }
        .import-trigger {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 4px;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.1);
        }

        .list-container { flex-grow: 1; overflow-y: auto; }
        .list-item {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .list-item:active { background: rgba(0, 242, 255, 0.1); }
        .song-title { font-size: 15px; flex-grow: 1; }
        .playing-now { color: var(--neon-blue); font-weight: bold; text-shadow: 0 0 8px var(--neon-blue); }
        .folder-tag { font-size: 10px; color: var(--neon-blue); opacity: 0.6; margin-top: 4px; }
        .status-msg { text-align: center; padding: 40px; color: var(--text-dim); font-size: 12px; }

        .tab-bar {
            height: 60px;
            display: flex;
            border-top: 1px solid var(--border-color);
            background: #000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .tab-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 900;
            color: var(--text-dim);
        }
        .tab-item.active { color: var(--neon-blue); border-top: 2px solid var(--neon-blue); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header class="header">
        <div id="lib-back" class="back-btn hidden" onclick="backToPlaylists()">BACK</div>
        <div id="lib-title" class="nav-title">PLAYLISTS</div>
    </header>

    <div class="action-area">
        <button class="import-trigger" onclick="document.getElementById('file-input').click()">選 曲</button>
        <input type="file" id="file-input" class="hidden" accept=".mp3,.m4a,.wav,.aac,.caf,audio/*" multiple onchange="handleFiles(this.files)">
    </div>

    <div id="list-container" class="list-container">
        <div class="status-msg">「選 曲」ボタンでNumbers内の<br>全曲を選択してください</div>
    </div>

    <nav class="tab-bar">
        <div id="tab-playlists" class="tab-item active" onclick="switchTab('playlists')">PLAYLISTS</div>
        <div id="tab-mymusic" class="tab-item" onclick="switchTab('mymusic')">MY MUSIC</div>
    </nav>

    <audio id="audio-player"></audio>

    <script>
        let allSongs = [];
        let playlistData = {};
        let currentTab = 'playlists';
        let currentFolder = null;
        let currentPlayingUrl = null;

        const listContainer = document.getElementById('list-container');
        const audio = document.getElementById('audio-player');

        // 起動時に保存されたリストを読み込む
        window.onload = () => {
            const savedData = localStorage.getItem('zeframe_list_data');
            if (savedData) {
                const parsed = JSON.parse(savedData);
                allSongs = parsed.allSongs || [];
                playlistData = parsed.playlistData || {};
                render();
            }
        };

        async function handleFiles(files) {
            if (files.length === 0) return;
            allSongs = [];
            playlistData = {};

            for (const file of files) {
                const fileURL = URL.createObjectURL(file);
                // フォルダ構造の解析（スマホでも取れるようにフォールバック設定）
                let folderName = "LDH";
                if (file.webkitRelativePath && file.webkitRelativePath.includes('/')) {
                    folderName = file.webkitRelativePath.split('/')[0];
                }
                const song = { 
                    title: file.name.replace(/\.[^/.]+$/, ""), 
                    file: fileURL, 
                    folder: folderName,
                    name: file.name 
                };
                
                allSongs.push(song);
                if (!playlistData[folderName]) playlistData[folderName] = [];
                playlistData[folderName].push(song);
            }
            allSongs.sort((a, b) => a.title.localeCompare(b.title, 'ja'));
            
            // リスト構成をiPhoneに保存（URL以外）
            const dataToSave = { 
                allSongs: allSongs.map(s => ({...s, file: null})), // URLは毎回変わるため保存しない
                playlistData: {} 
            };
            Object.keys(playlistData).forEach(k => {
                dataToSave.playlistData[k] = playlistData[k].map(s => ({...s, file: null}));
            });
            localStorage.setItem('zeframe_list_data', JSON.stringify(dataToSave));

            render();
        }

        function switchTab(tab) {
            currentTab = tab;
            currentFolder = null;
            document.getElementById('tab-playlists').classList.toggle('active', tab === 'playlists');
            document.getElementById('tab-mymusic').classList.toggle('active', tab === 'mymusic');
            render();
        }

        function render() {
            listContainer.innerHTML = '';
            document.getElementById('lib-back').classList.add('hidden');

            if (currentTab === 'playlists') {
                document.getElementById('lib-title').textContent = "PLAYLISTS";
                if (currentFolder) {
                    document.getElementById('lib-back').classList.remove('hidden');
                    document.getElementById('lib-title').textContent = currentFolder.toUpperCase();
                    renderSongs(playlistData[currentFolder]);
                } else {
                    if (Object.keys(playlistData).length === 0) {
                        listContainer.innerHTML = '<div class="status-msg">フォルダがありません</div>';
                        return;
                    }
                    Object.keys(playlistData).forEach(folder => {
                        const item = document.createElement('div');
                        item.className = 'list-item';
                        item.innerHTML = `<span>${folder}</span><span style="color:var(--text-dim)">FOLDER</span>`;
                        item.onclick = () => { currentFolder = folder; render(); };
                        listContainer.appendChild(item);
                    });
                }
            } else {
                document.getElementById('lib-title').textContent = "MY MUSIC";
                if (allSongs.length === 0) {
                    listContainer.innerHTML = '<div class="status-msg">曲がありません</div>';
                    return;
                }
                renderSongs(allSongs, true);
            }
        }

        function renderSongs(songs, showFolder = false) {
            songs.forEach(song => {
                const item = document.createElement('div');
                item.className = 'list-item';
                const isPlaying = currentPlayingUrl === song.file && !audio.paused;
                
                // ファイルURLがない（記憶されたリスト）場合は、少し暗く表示
                const isDisabled = !song.file;

                item.innerHTML = `
                    <div style="opacity: ${isDisabled ? '0.5' : '1'}">
                        <div class="song-title ${isPlaying ? 'playing-now' : ''}">${song.title}</div>
                        ${showFolder ? `<div class="folder-tag">${song.folder}</div>` : ''}
                    </div>
                    <div class="playing-now">${isPlaying ? '||' : (isDisabled ? '?' : '▶')}</div>
                `;
                item.onclick = () => {
                    if (isDisabled) {
                        alert("セキュリティのため、もう一度「選 曲」ボタンで音楽ファイルを選択してください。");
                    } else {
                        playSong(song);
                    }
                };
                listContainer.appendChild(item);
            });
        }

        function playSong(song) {
            if (audio.src === song.file) {
                if (audio.paused) audio.play();
                else audio.pause();
            } else {
                audio.src = song.file;
                currentPlayingUrl = song.file;
                audio.play();
            }
            render();
        }

        function backToPlaylists() { currentFolder = null; render(); }
        audio.onplay = render;
        audio.onpause = render;
        audio.onended = () => { currentPlayingUrl = null; render(); };
    </script>
</body>
</html>
